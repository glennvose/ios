<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>AP Lang · Video Checklist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: #050506;
      font-family: Geist, system-ui, sans-serif;
      color: #f4f3ef;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #131316 0%, #050506 70%);
    }
    /* Hide scrollbars inside app */
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="stage"></div>

  <script src="data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    const { useEffect, useState } = React;

    function Bezel({ children }) {
      // Custom dark phone bezel — no off-the-shelf iOS chrome since this is a designed product
      const W = 390, H = 820;
      const [scale, setScale] = useState(1);
      useEffect(() => {
        const fit = () => {
          const sx = window.innerWidth / (W + 80);
          const sy = window.innerHeight / (H + 80);
          setScale(Math.min(sx, sy, 1.05));
        };
        fit();
        window.addEventListener('resize', fit);
        return () => window.removeEventListener('resize', fit);
      }, []);
      return (
        <div style={{
          width: W, height: H,
          transform: `scale(${scale})`,
          transformOrigin: 'center center',
          borderRadius: 54,
          padding: 8,
          background: 'linear-gradient(160deg, #2a2a2e 0%, #0e0e10 60%, #1a1a1d 100%)',
          boxShadow: '0 60px 140px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06), inset 0 0 0 2px rgba(255,255,255,0.02)',
          position: 'relative',
        }}>
          <div style={{
            width: '100%', height: '100%',
            borderRadius: 46,
            overflow: 'hidden',
            position: 'relative',
            background: '#0a0a0b',
            boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.04)',
          }}>
            {/* Dynamic island */}
            <div style={{
              position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
              width: 116, height: 34, borderRadius: 20,
              background: '#000', zIndex: 100, pointerEvents: 'none',
            }}/>
            {children}
          </div>
        </div>
      );
    }

    function Root() {
      return (
        <Bezel>
          <App/>
        </Bezel>
      );
    }

    ReactDOM.createRoot(document.getElementById('stage')).render(<Root/>);
  </script>
</body>
</html>
