<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <title>AP Lang · Video Checklist</title>

  <!-- iOS PWA / Add to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="AP Lang"/>
  <meta name="theme-color" content="#0a0a0b"/>
  <meta name="mobile-web-app-capable" content="yes"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      background: #0a0a0b;
      overscroll-behavior: none;
    }
    body {
      font-family: Geist, system-ui, sans-serif;
      color: #f4f3ef;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      /* Prevent rubber-band scroll on iOS */
      position: fixed;
      inset: 0;
      overflow: hidden;
    }
    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
      background: #0a0a0b;
    }
    .app-shell {
      width: 100%;
      height: 100%;
      max-width: 480px;
      background: #0a0a0b;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* On wider screens (desktop), show subtle frame so it reads as an app */
    @media (min-width: 600px) {
      #stage {
        background: radial-gradient(ellipse at center, #131316 0%, #050506 70%);
        align-items: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .app-shell {
        height: min(900px, calc(100vh - 48px));
        border-radius: 28px;
        box-shadow: 0 40px 100px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
      }
    }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="stage">
    <div class="app-shell" id="app-shell"></div>
  </div>

  <script src="data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('app-shell')).render(<App/>);
  </script>
</body>
</html>
